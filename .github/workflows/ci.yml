name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node 24 for all JS-based actions ahead of GitHub's June 2026
# default switch (Node 20 deprecated). Removable once every action we use
# ships a Node-24-native version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  frontend:
    name: Frontend test + build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend
      - name: Unit tests
        run: npm test
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install
        run: pip install -r requirements.txt
      - name: Import check
        env:
          FLASK_SECRET_KEY: ci-dummy
        run: python -c "import server"
      - name: Unit tests
        env:
          FLASK_SECRET_KEY: ci-dummy
        run: python -m unittest discover -s tests -p 'test_*.py'
