<!-- ═══ Radar sweep — faint vertical bar that traverses the canvas every ~10s ═══ -->
<g opacity="0.45">
  <rect x="0" y="0" width="60" height="250" fill="url(#sweep)">
    <animate attributeName="x" from="-60" to="900" dur="10s" repeatCount="indefinite"/>
  </rect>
</g>

