<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 34" width="900" height="34">
<defs>
  <style>
    .lbl { font-family: 'Courier New', Courier, monospace; font-size: 14px; letter-spacing: 0.18em; }
  </style>
  <filter id="g" x="-30%" y="-80%" width="160%" height="260%">
    <feGaussianBlur stdDeviation="1.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<g filter="url(#g)">
  <path d="M 0,10 L 0,0 L 10,0" fill="none" stroke="#66ffff" stroke-width="1" opacity="0.7"/>
  <line x1="10" y1="0" x2="900" y2="0" stroke="#66ffff" stroke-width="0.75" opacity="0.45"/>
</g>
<text class="lbl" x="16" y="24" fill="#aaffff" opacity="0.9">LICENSE</text>
</svg>
