<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
<defs>
  <style>
    .demo-mono { font-family: 'Courier New', Courier, monospace; }
    .demo-sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    /* Animation keyframes */
    @keyframes typing {
      0%, 10% { opacity: 0; }
      15% { opacity: 1; }
      100% { opacity: 1; }
    }
    
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    @keyframes scanLine {
      0%, 35% { opacity: 0; }
      40% { opacity: 0; }
      45% { opacity: 0.8; }
      50% { opacity: 0; }
      100% { opacity: 0; }
    }
    
    @keyframes highlightGlow {
      0%, 40% { opacity: 0; }
      45% { opacity: 0; }
      50% { opacity: 0.7; }
      55%, 100% { opacity: 0.5; }
    }
    
    @keyframes zoomPulse {
      0%, 45% { transform: scale(1); opacity: 0; }
      50% { transform: scale(1.02); opacity: 1; }
      55% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
  
  <!-- Rounded container clip -->
  <clipPath id="demo-clip">
    <rect width="1200" height="600" rx="24" ry="24"/>
  </clipPath>
  
  <!-- Glow filters -->
  <filter id="demo-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  
  <filter id="demo-soft-glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Gradient for search highlight -->
  <linearGradient id="search-glow" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0%" stop-color="#66ffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#66ffff" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#66ffff" stop-opacity="0"/>
  </linearGradient>
  
  <!-- Canvas grid pattern -->
  <pattern id="canvas-grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(102,255,255,0.08)" stroke-width="0.5"/>
  </pattern>
</defs>

<!-- Main container with rounded corners -->
<g clip-path="url(#demo-clip)">
  
  <!-- Background — deep space blue with subtle grid -->
  <rect width="1200" height="600" fill="#0A0D14"/>
  <rect width="1200" height="600" fill="url(#canvas-grid)"/>
  
  <!-- Atmospheric glow top-left -->
  <ellipse cx="200" cy="100" rx="400" ry="200" fill="rgba(102,255,255,0.03)"/>
  
  <!-- ═══════════════════════════════════════════════════════════
       SCENE 1: Canvas with research content (left side)
       ═══════════════════════════════════════════════════════════ -->
  
  <!-- Frame: Marine Biology Research -->
  <g opacity="0.95">
    <rect x="60" y="80" width="480" height="440" rx="8" fill="none" stroke="rgba(102,255,255,0.35)" stroke-width="1.5"/>
    <rect x="70" y="68" width="140" height="20" rx="3" fill="#4A7BB3"/>
    <text x="140" y="82" text-anchor="middle" class="demo-mono" font-size="11" fill="#ffffff" font-weight="500">MARINE BIOLOGY</text>
  </g>
  
  <!-- Sticky note 1: Hypothesis -->
  <g transform="rotate(-1.5 180 140)">
    <rect x="80" y="110" width="200" height="140" rx="2" fill="#C8B0F5" opacity="0.92"/>
    <text x="95" y="135" class="demo-sans" font-size="13" fill="#1a1a2e" font-weight="500">Hypothesis</text>
    <text x="95" y="158" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">Bioluminescence patterns</text>
    <text x="95" y="175" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">correlate with depth</text>
    <text x="95" y="192" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">and water temperature</text>
    <text x="95" y="215" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">in deep-sea jellyfish</text>
  </g>
  
  <!-- Image card: Jellyfish specimen -->
  <g>
    <rect x="310" y="110" width="210" height="180" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(102,255,255,0.2)" stroke-width="1"/>
    <!-- Image placeholder with jellyfish icon -->
    <rect x="318" y="118" width="194" height="120" rx="4" fill="linear-gradient(135deg, #1a2838 0%, #0f1820 100%)"/>
    <text x="415" y="178" text-anchor="middle" font-size="32" opacity="0.3">🪼</text>
    <!-- OCR'd text caption -->
    <rect x="318" y="238" width="194" height="44" fill="rgba(255,255,255,0.02)"/>
    <text x="328" y="256" class="demo-sans" font-size="10" fill="#9AA4B2">Species: Atolla wyvillei</text>
    <text x="328" y="272" class="demo-sans" font-size="10" fill="#9AA4B2">Depth: 2,400m · Temp: 4°C</text>
  </g>
  
  <!-- Sticky note 2: Findings -->
  <g transform="rotate(1.2 420 360)">
    <rect x="80" y="280" width="200" height="120" rx="2" fill="#88D4B0" opacity="0.92"/>
    <text x="95" y="305" class="demo-sans" font-size="13" fill="#1a1a2e" font-weight="500">Key Finding</text>
    <text x="95" y="328" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">Flash frequency increases</text>
    <text x="95" y="345" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">3x at thermal vents</text>
    <text x="95" y="368" class="demo-sans" font-size="11.5" fill="#2a2a3e" opacity="0.85">→ communication signal?</text>
  </g>
  
  <!-- Text shape: Data point -->
  <g>
    <text x="320" y="330" class="demo-sans" font-size="12" fill="#E6E8EC" font-weight="500">Sample #A-2847</text>
    <text x="320" y="350" class="demo-sans" font-size="11" fill="#9AA4B2">Collected: 2026-03-15</text>
    <text x="320" y="368" class="demo-sans" font-size="11" fill="#9AA4B2">Location: 34.2°N, 120.8°W</text>
  </g>
  
  <!-- Arrow connecting hypothesis to image -->
  <path d="M 280 180 L 310 165" stroke="rgba(156,201,232,0.4)" stroke-width="1.5" fill="none" marker-end="url(#arrow-head)"/>
  
  <!-- ═══════════════════════════════════════════════════════════
       SCENE 2: Search interface (right side)
       ═══════════════════════════════════════════════════════════ -->
  
  <!-- Search modal backdrop -->
  <rect x="620" y="60" width="520" height="480" rx="12" fill="rgba(15,18,25,0.95)" stroke="rgba(102,255,255,0.25)" stroke-width="1" filter="url(#demo-soft-glow)"/>
  
  <!-- Search header -->
  <rect x="620" y="60" width="520" height="56" rx="12" fill="rgba(22,27,38,0.8)"/>
  <rect x="620" y="116" width="520" height="1" fill="rgba(102,255,255,0.15)"/>
  
  <!-- Search icon -->
  <circle cx="650" cy="88" r="10" fill="none" stroke="#66ffff" stroke-width="1.5"/>
  <line x1="657" y1="95" x2="663" y2="101" stroke="#66ffff" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Search query text with typing animation -->
  <g>
    <text x="675" y="93" class="demo-sans" font-size="15" fill="#E6E8EC" font-weight="400">
      <tspan style="animation: typing 8s ease-in-out infinite;">j</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.1s;">e</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.2s;">l</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.3s;">l</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.4s;">y</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.5s;">f</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.6s;">i</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.7s;">s</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.8s;">h</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 0.9s;"> </tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.0s;">t</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.1s;">h</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.2s;">e</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.3s;">r</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.4s;">m</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.5s;">a</tspan>
      <tspan style="animation: typing 8s ease-in-out infinite; animation-delay: 1.6s;">l</tspan>
    </text>
    
    <!-- Blinking cursor -->
    <rect x="835" y="80" width="2" height="18" fill="#66ffff">
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.2;0.21;0.22;0.23;1"/>
    </rect>
  </g>
  
  <!-- Search scope pill -->
  <rect x="870" y="78" width="120" height="22" rx="11" fill="rgba(102,255,255,0.12)" stroke="rgba(102,255,255,0.3)" stroke-width="1"/>
  <text x="930" y="92" text-anchor="middle" class="demo-mono" font-size="10" fill="#66ffff" font-weight="500">ALL BOARDS</text>
  
  <!-- Close button -->
  <g opacity="0.6">
    <line x1="1110" y1="83" x2="1120" y2="93" stroke="#9AA4B2" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="1120" y1="83" x2="1110" y2="93" stroke="#9AA4B2" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Results header with fade in -->
  <text x="650" y="148" class="demo-mono" font-size="10" fill="#6E7686" letter-spacing="0.1em">
    <animate attributeName="opacity" values="0;0;1;1" dur="8s" repeatCount="indefinite" keyTimes="0;0.25;0.3;1"/>
    RESULTS · 3 MATCHES
  </text>
  
  <!-- Result 1: Board match with highlight -->
  <g style="animation: fadeIn 0.4s ease-out 2.4s both;">
    <rect x="650" y="170" width="460" height="80" rx="8" fill="rgba(102,255,255,0.04)" stroke="rgba(102,255,255,0.15)" stroke-width="1"/>
    <!-- Glow effect for active result -->
    <rect x="650" y="170" width="460" height="80" rx="8" fill="none" stroke="rgba(102,255,255,0.4)" stroke-width="2" style="animation: pulse 2s ease-in-out 3s infinite;"/>
    
    <text x="670" y="192" class="demo-sans" font-size="13" fill="#E6E8EC" font-weight="500">Marine Biology Research</text>
    <text x="670" y="212" class="demo-sans" font-size="11.5" fill="#9AA4B2">Species: Atolla wyvillei · Depth: 2,400m · Temp: 4°C</text>
    <text x="670" y="232" class="demo-sans" font-size="11.5" fill="#66ffff" opacity="0.8">Flash frequency increases 3x at thermal vents</text>
    
    <!-- Match indicator -->
    <circle cx="1090" cy="210" r="4" fill="#66ffff" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>
  
  <!-- Result 2: Image OCR match -->
  <g style="animation: fadeIn 0.4s ease-out 2.6s both;">
    <rect x="650" y="265" width="460" height="70" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(102,255,255,0.08)" stroke-width="1"/>
    
    <rect x="670" y="280" width="40" height="40" rx="4" fill="rgba(102,255,255,0.08)"/>
    <text x="690" y="305" text-anchor="middle" font-size="18" opacity="0.4">🪼</text>
    
    <text x="725" y="295" class="demo-sans" font-size="12" fill="#E6E8EC" font-weight="500">Deep Sea Specimens</text>
    <text x="725" y="313" class="demo-sans" font-size="10.5" fill="#9AA4B2">Image · OCR match: "thermal vent jellyfish colony"</text>
  </g>
  
  <!-- Result 3: Text match -->
  <g style="animation: fadeIn 0.4s ease-out 2.8s both;">
    <rect x="650" y="350" width="460" height="70" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(102,255,255,0.08)" stroke-width="1"/>
    
    <text x="670" y="372" class="demo-sans" font-size="12" fill="#E6E8EC" font-weight="500">Field Notes · March 2026</text>
    <text x="670" y="390" class="demo-sans" font-size="10.5" fill="#9AA4B2">Observed jellyfish behavior near thermal vents shows</text>
    <text x="670" y="406" class="demo-sans" font-size="10.5" fill="#9AA4B2">increased bioluminescence activity...</text>
  </g>
  
  <!-- Navigation hint -->
  <g opacity="0.5">
    <text x="650" y="460" class="demo-mono" font-size="10" fill="#6E7686" letter-spacing="0.08em">↵ OPEN · ↑↓ NAVIGATE · ESC CLOSE</text>
  </g>
  
  <!-- ═══════════════════════════════════════════════════════════
       SCENE 3: Visual connection - search to canvas highlight
       ═══════════════════════════════════════════════════════════ -->
  
  <!-- Animated scan line from search to canvas -->
  <line x1="620" y1="210" x2="540" y2="210" stroke="url(#search-glow)" stroke-width="2" style="animation: scanLine 8s ease-in-out infinite;"/>
  
  <!-- Highlight ring around matched content on canvas -->
  <rect x="306" y="106" width="218" height="188" rx="8" fill="none" stroke="#66ffff" stroke-width="2.5" filter="url(#demo-glow)" style="animation: highlightGlow 8s ease-in-out infinite;"/>
  
  <!-- Match counter chip -->
  <g transform="translate(310, 110)" style="animation: highlightGlow 8s ease-in-out infinite;">
    <rect width="32" height="18" rx="3" fill="#66ffff"/>
    <text x="16" y="13" text-anchor="middle" class="demo-mono" font-size="10" fill="#0A0D14" font-weight="600">1/3</text>
  </g>
  
  <!-- Canvas zoom effect on the matched image -->
  <g style="animation: zoomPulse 8s ease-in-out infinite;" transform-origin="415px 200px">
    <!-- Invisible rect to define transform origin -->
    <rect x="310" y="110" width="210" height="180" fill="none" pointer-events="none"/>
  </g>
  
  <!-- ═══════════════════════════════════════════════════════════
       HUD Elements - futuristic research station chrome
       ═══════════════════════════════════════════════════════════ -->
  
  <!-- Corner brackets -->
  <g fill="none" stroke="#66ffff" stroke-width="1.5" opacity="0.4" filter="url(#demo-soft-glow)">
    <path d="M 24,60 L 24,24 L 60,24"/>
    <path d="M 1140,24 L 1176,24 L 1176,60"/>
    <path d="M 24,540 L 24,576 L 60,576"/>
    <path d="M 1140,576 L 1176,576 L 1176,540"/>
  </g>
  
  <!-- Status indicators -->
  <g class="demo-mono" font-size="9" fill="#66ffff" opacity="0.5">
    <text x="32" y="42">DEMO.STATION8</text>
    <text x="1168" y="42" text-anchor="end">SEARCH ACTIVE</text>
    <text x="32" y="568">OCR INDEXED</text>
    <text x="1168" y="568" text-anchor="end">3 MATCHES</text>
  </g>
  
  <!-- Pulse indicator -->
  <circle cx="1150" cy="36" r="3" fill="#66ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>

</g>

<!-- Arrow marker definition -->
<defs>
  <marker id="arrow-head" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <polygon points="0 0, 6 3, 0 6" fill="rgba(156,201,232,0.4)"/>
  </marker>
</defs>

</svg>
