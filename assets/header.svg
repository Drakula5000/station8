  <text class="s8" x="110" y="90"  fill="#00ff00" xml:space="preserve">░▒▓███████▓▒░▒▓████████▓▒░▒▓██████▓▒░▒▓████████▓▒░▒▓█▓▒░░▒▓██████▓▒░░▒▓███████▓▒░        ░▒▓██████▓▒░</text>
