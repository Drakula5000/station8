    <text class="hr" x="0" y="94"  fill="#00ff00" opacity="0.65">░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ · ░░ ·</text>
