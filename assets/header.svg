    <text class="hr" x="0" y="54"  fill="#00ff00" opacity="0.40">- · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - · - ·</text>
  </g>

  <!-- Row 4  y=74 -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-900,0" to="0,0" dur="40s" repeatCount="indefinite"/>
    <text class="hr" x="0" y="74"  fill="#00ff00" opacity="0.50">░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ · ░ ·</text>
