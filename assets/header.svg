    <text class="hr" x="0" y="174" fill="#00ff00" opacity="0.40">·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·   -   ·</text>
  </g>

  <!-- Row 10 y=194 -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-900,0" to="0,0" dur="38s" repeatCount="indefinite"/>
    <text class="hr" x="0" y="194" fill="#00ff00" opacity="0.30">.       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .       .</text>
  </g>

  <!-- Row 11 y=214 -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="0,0" to="-900,0" dur="55s" repeatCount="indefinite"/>
    <text class="hr" x="0" y="214" fill="#00ff00" opacity="0.25">,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,         ,</text>
  </g>

  <!-- Row 12 y=234  foreground far edge -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-900,0" to="0,0" dur="75s" repeatCount="indefinite"/>
    <text class="hr" x="0" y="234" fill="#00ff00" opacity="0.20">·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·           ·</text>
  </g>

</g>

<!-- Edge vignette -->
<rect width="900" height="250" fill="url(#vl)"/>

<!-- Dim overlay behind text for legibility -->
<rect x="60" y="72" width="780" height="120" rx="4" fill="#000000" opacity="0.55"/>

<!-- ═══ STATION 8 block text — bright neon green with glow ═══ -->
