services:
  - type: web
    name: station8
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    buildFilter:
      paths:
        - server.py
        - requirements.txt
        - render.yaml
        - start.sh
        - ops/**
      ignoredPaths:
        - frontend/**
        - mockups/**
        - backups/**
        - data/**
        - uploads/**
        - private/**
        - "**/*.md"
        - .github/**
        - .vscode/**
        - .claude/**
    disk:
      name: station8-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: S8_STORAGE_DIR
        value: /var/data
